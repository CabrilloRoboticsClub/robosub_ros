# Bridge of ROS and Gazebo topics
# See: https://github.com/gazebosim/ros_gz/tree/humble/ros_gz_bridge

# Bridge for each individual thruster
- ros_topic_name: '/thruster_values'
  gz_topic_name: '/X3/gazebo/command/thruster_values'
  ros_type_name: 'actuator_msgs/msg/Actuators'
  gz_type_name: 'gz.msgs.Actuators'
  direction: 'ROS_TO_GZ'


